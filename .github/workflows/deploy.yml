name: CI/CD Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        env:
          PYTHONPATH: .
        run: |
          pytest backend/tests/test_main.py

  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Execute Remote Deploy Commands via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_KEY }}
          port: ${{ secrets.AZURE_VM_PORT || 22 }}
          script: |
            # Navigate to the project directory on the VM
            cd ~/PROYECTO_JAC
            
            # Reset local changes and pull the latest code from main
            git fetch --all
            git reset --hard origin/main
            
            # Rebuild and restart the container in the background
            docker compose down
            docker compose up -d --build
            
            # Clean up unused Docker images to save space
            docker image prune -f
